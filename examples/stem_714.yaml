# Stem-separation upmix → 7.1.4 WAV
#
# Best quality spatial upmix for studio / mastering use.
# Requires: pip install "upmixer[separation-cpu]"
#
# Usage:
#   upmixer --manifest stem_714.yaml

input:  stereo.flac
output: stem_714.wav

mode:   stem
format: 7.1.4

# ── Stem separation model ──────────────────────────────────────────────────────
# Default htdemucs_ft.yaml is a good 4-stem model (vocals/drums/bass/other).
# Uncomment to use a higher-quality 6-stem or RoFormer model.
# stem_model: htdemucs_6s.yaml
# stem_model: BS-Roformer-Viperx-1297.ckpt

# ── Mixing (stem mode only) ───────────────────────────────────────────────────
# Applied after stem separation, before spatial routing.
# Remove section or comment it out to use default content-aware routing.
mixing:
  # Stem rebalance: bring vocals forward, tighten bass
  # stem_rebalance:
  #   Vocals: +1.0
  #   Bass:   +0.5
  #   Drums:  -0.5

  # Per-stem EQ
  # stem_eq:
  #   Vocals: vocal-presence
  #   Bass:   bass-warmth
  #   Drums:  drums-punch

  # Stem cache — skip re-separation on repeated test runs
  # stem_cache_dir: /tmp/upmixer_stems

# ── Mastering ──────────────────────────────────────────────────────────────────
mastering:
  # EQ shaping
  eq:
    profile: spatial-present   # adds presence and definition to instruments
    strength: 0.8              # slightly reduced for a subtler effect
    # EQ from reference (overrides profile):
    # reference: reference_714.wav
    # match_strength: 0.5

  # Bus compression / glue
  compressor:
    profile: transparent       # very gentle — preserves studio dynamics
    # threshold: -22.0
    # ratio:     1.5

  # Bass control (optional)
  # bass:
  #   profile: enhance
  #   lfe_gain: 1.0

  # Loudness normalization
  loudness:
    normalize: true
    target: -18.0
    max_tp: -1.0

# ── Processing ────────────────────────────────────────────────────────────────
# Uncomment to test on a 30 s excerpt before committing to a full run.
# processing:
#   preview: true
#   preview_duration: 30.0
